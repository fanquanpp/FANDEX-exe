# Dependabot 配置文件 - FANDEX-exe 仓库
# 技术栈: Electron 33 + npm
# 生态系统: npm + github-actions
# 维护策略: 每周一 09:00 (Asia/Shanghai) 检查依赖更新
# 安全策略: npm 生态忽略 major 版本自动升级, 避免破坏稳定性
version: 2
updates:
  # npm 生态配置 - 主项目依赖
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "increase"
    # 分组策略: Electron 全家桶合并升级, 保证版本一致性
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-builder"
    # 忽略 major 版本升级, 需手动评估
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  # GitHub Actions 生态配置 - 工作流依赖
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"