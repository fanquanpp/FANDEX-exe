name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels:
      - 'feat'
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: 'Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'maintenance'
      - 'dependencies'

exclude-labels:
  - 'duplicate'
  - 'invalid'
  - 'wontfix'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/fanquanpp/FANDEX-exe/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
