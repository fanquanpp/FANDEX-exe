name: CI

# 日常验证流水线：lint / typecheck / test → build → e2e
# 适配 Tauri 2 + Astro 7 + React 19 + Tailwind v4 技术栈，使用 pnpm v10 workspace

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 阶段 1：代码规范检查（Biome）+ 类型检查（astro check）+ 单元测试（Vitest）
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules (sharp / pagefind)
        run: pnpm --filter web exec -- pnpm rebuild sharp pagefind

      - name: Run Biome lint
        run: pnpm --filter web lint

      - name: Run type check
        run: pnpm --filter web typecheck

      - name: Run unit tests
        run: pnpm --filter web test

  # 阶段 2：构建验证（含构建脚本 + Astro build + Pagefind 索引）
  build:
    name: Build
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Astro build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.astro
          key: ${{ runner.os }}-astro-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules (sharp / pagefind)
        run: pnpm --filter web exec -- pnpm rebuild sharp pagefind

      - name: Build (Astro 7 + Pagefind)
        run: pnpm --filter web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify build output
        run: |
          if [ -d "apps/web/dist" ]; then
            echo "Build output verified"
            ls -la apps/web/dist | head -10
          else
            echo "::error::Build output apps/web/dist not found"
            exit 1
          fi

      - name: Verify Pagefind index
        run: |
          if [ -d "apps/web/dist/pagefind" ]; then
            echo "Pagefind index found"
            ls -la apps/web/dist/pagefind/ | head -5
          else
            echo "::warning::Pagefind index not found - search will not work"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/web/dist
          retention-days: 14

  # 阶段 3：端到端测试（Playwright），依赖 build 产物
  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules (sharp / pagefind)
        run: pnpm --filter web exec -- pnpm rebuild sharp pagefind

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: apps/web/dist

      - name: Run E2E tests (Playwright)
        run: pnpm --filter web test:e2e
        env:
          CI: true
