name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm install --no-save @rollup/rollup-linux-x64-gnu sharp @pagefind/linux-x64

      - name: Run ESLint
        run: npm run lint -w apps/web

      - name: Run Prettier check
        run: npm run format:check -w apps/web

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm install --no-save @rollup/rollup-linux-x64-gnu sharp @pagefind/linux-x64

      - name: Run Type Check
        run: npm run typecheck -w apps/web

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm install --no-save @rollup/rollup-linux-x64-gnu sharp @pagefind/linux-x64

      - name: Run Tests
        run: npm run test -w apps/web
