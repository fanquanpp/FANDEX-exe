name: Content Update & Quality Check

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'metadata/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  audit-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Run content audit
        run: node scripts/content-audit.mjs

      - name: Build search index
        run: node scripts/build-search-index.mjs

      - name: Build glossary index
        run: node scripts/build-glossary-index.mjs

      - name: Build module docs index
        run: node scripts/build-module-docs-index.mjs

      - name: Build tag index
        run: node scripts/build-tag-index.mjs

      - name: Generate knowledge graph
        run: node scripts/generate-knowledge-graph.mjs

      - name: Generate embedding index
        run: node scripts/generate-embedding-index.mjs
        continue-on-error: true

      - name: Verify generated data
        run: |
          echo "Checking generated data files..."
          for f in public/data/search-index.json public/data/glossary-index.json public/data/module-docs-index.json public/data/tag-index.json public/data/knowledge-graph.json; do
            if [ -f "apps/web/$f" ]; then
              echo "OK: $f"
            else
              echo "::warning::Missing $f"
            fi
          done

      - name: Lint check
        run: npm run lint
        working-directory: apps/web
        continue-on-error: true

      - name: Type check
        run: npm run typecheck
        working-directory: apps/web
        continue-on-error: true
