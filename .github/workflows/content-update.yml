name: Content Update & Quality Check

# 内容更新与质量检查流水线
# 适配 Tauri 2 + Astro 7 + React 19 + Tailwind v4 技术栈，使用 pnpm v10 workspace + Node 24

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'metadata/**'
      - 'scripts/**'
      - 'apps/web/src/content/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-content:
    name: Content Audit & Index Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules (sharp / pagefind)
        run: pnpm --filter web exec -- pnpm rebuild sharp pagefind

      - name: Run content audit
        run: node scripts/content-audit.mjs

      - name: Build search index
        run: node scripts/build-search-index.mjs

      - name: Build glossary index
        run: node scripts/build-glossary-index.mjs

      - name: Build module docs index
        run: node scripts/build-module-docs-index.mjs

      - name: Build tag index
        run: node scripts/build-tag-index.mjs

      - name: Generate knowledge graph
        run: node scripts/generate-knowledge-graph.mjs

      - name: Generate embedding index
        run: node scripts/generate-embedding-index.mjs
        continue-on-error: true

      - name: Verify generated data
        run: |
          echo "Checking generated data files..."
          for f in search-index.json glossary-index.json module-docs-index.json tag-index.json knowledge-graph.json; do
            if [ -f "apps/web/public/data/$f" ]; then
              echo "OK: apps/web/public/data/$f"
            else
              echo "::warning::Missing apps/web/public/data/$f"
            fi
          done

      - name: Lint check
        run: pnpm lint
        continue-on-error: true

      - name: Type check
        run: pnpm typecheck
        continue-on-error: true
