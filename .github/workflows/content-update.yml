name: Content Update & Quality Check

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'metadata/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  audit-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm install --no-save @rollup/rollup-linux-x64-gnu sharp

      - name: Run content audit
        run: node scripts/content-audit.mjs

      - name: Build search index
        run: node scripts/build-search-index.mjs

      - name: Build glossary index
        run: node scripts/build-glossary-index.mjs

      - name: Build module docs index
        run: node scripts/build-module-docs-index.mjs

      - name: Build tag index
        run: node scripts/build-tag-index.mjs

      - name: Generate knowledge graph
        run: node scripts/generate-knowledge-graph.mjs

      - name: Generate embedding index
        run: node scripts/generate-embedding-index.mjs
        continue-on-error: true

      - name: Verify generated data
        run: |
          echo "Checking generated data files..."
          for f in search-index.json glossary-index.json module-docs-index.json tag-index.json knowledge-graph.json; do
            if [ -f "apps/web/public/data/$f" ]; then
              echo "OK: apps/web/public/data/$f"
            else
              echo "::warning::Missing apps/web/public/data/$f"
            fi
          done

      - name: Lint check
        run: npm run lint -w apps/web
        continue-on-error: true

      - name: Type check
        run: npm run typecheck -w apps/web
        continue-on-error: true
