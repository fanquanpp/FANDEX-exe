name: Deploy to GitHub Pages

# GitHub Pages 部署流水线
# 触发：push 到 main 分支（仅内容/前端源码变更），自动构建并部署到 GitHub Pages
# 适配 pnpm v10 workspace + Astro 7 + React 19 技术栈

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'metadata/**'
      - 'apps/web/src/**'
      - 'apps/web/public/**'
      - 'apps/web/astro.config.ts'
      - 'apps/web/tsconfig.json'
      - 'apps/web/package.json'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 单一 Job：构建并部署（GitHub Pages artifact + deploy-pages）
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Astro build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.astro
          key: ${{ runner.os }}-astro-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules (sharp / pagefind)
        run: pnpm --filter web exec -- pnpm rebuild sharp pagefind

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: astro

      - name: Build (Astro 7 + Pagefind)
        run: pnpm --filter web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
