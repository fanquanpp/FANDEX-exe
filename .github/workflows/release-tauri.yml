name: Release (Tauri)

# Tauri 2 桌面端发布流水线
# 触发：push tag v*.*.*，跨平台 matrix 构建 Tauri 桌面端安装包并发布到 GitHub Releases
# 适配 Tauri 2 + Rust + Astro 7 + React 19 技术栈

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 阶段 1：跨平台 matrix 构建 Tauri 安装包
  build-tauri:
    name: Build Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules (sharp / pagefind)
        run: pnpm --filter web exec -- pnpm rebuild sharp pagefind

      - name: Build web frontend (Astro 7 + Pagefind)
        run: pnpm --filter web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build Tauri app
        # 必须在仓库根目录运行，因为 tauri.conf.json 位于 src-tauri/ 子目录
        # Tauri CLI 从当前目录开始递归搜索子目录中的 tauri.conf.json
        # 若在 apps/web 下运行会因找不到配置文件而 panic
        run: pnpm tauri:build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # 跳过 beforeBuildCommand，避免重复构建前端（上一步已构建）
          TAURI_SKIP_BEFORE_DEV_COMMAND: "true"

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/app/*.app
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: ignore
          retention-days: 30

  # 阶段 2：聚合所有平台产物，创建 GitHub Release
  release:
    name: Publish Release
    needs: build-tauri
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Download Windows bundles
        uses: actions/download-artifact@v4
        with:
          name: tauri-bundles-windows
          path: ./release-assets

      - name: Download macOS bundles
        uses: actions/download-artifact@v4
        with:
          name: tauri-bundles-macos
          path: ./release-assets

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          name: tauri-bundles-linux
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FANDEX v${{ steps.version.outputs.version }}
          body: |
            ## FANDEX v${{ steps.version.outputs.version }}

            基于 Tauri 2 + Astro 7 + React 19 的跨平台桌面学习平台。

            ### 安装说明

            #### Windows
            下载 `.exe` (NSIS 安装程序) 或 `.msi` (MSI 安装包)，双击安装即可。需 Windows 10 或更高版本。

            #### macOS
            下载 `.dmg` 镜像，挂载后拖入应用程序目录。支持 Intel 与 Apple Silicon。

            #### Linux
            下载 `.deb` (Debian/Ubuntu) 或 `.AppImage` (通用) 或 `.rpm` (Fedora/RHEL) 安装包。
          files: |
            ./release-assets/**/*
          draft: false
          prerelease: false
