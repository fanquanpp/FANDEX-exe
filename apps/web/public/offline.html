<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANDEX - 离线模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .offline-container {
      text-align: center;
      max-width: 480px;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      color: #3366cc;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #0d0d0d;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #4d4d4d;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: #3366cc;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #264da8; }
  </style>
</head>
<body>
  <div class="offline-container">
    <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      <line x1="9" y1="9" x2="15" y2="9" stroke-dasharray="2 2" />
    </svg>
    <h1>当前处于离线模式</h1>
    <p>您正在离线使用 FANDEX。已缓存的页面可以正常访问，但未缓存的页面和 AI 功能暂时不可用。请连接网络后重试。</p>
    <button class="retry-btn" onclick="location.reload()">重新尝试连接</button>
  </div>
</body>
</html>
